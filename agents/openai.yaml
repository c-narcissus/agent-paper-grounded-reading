interface:
  display_name: "Agent Paper Grounded Reading"
  short_description: "Grounded paper reading with reusable PDF tools and a live reader."
  brand_color: "#0F766E"
  default_prompt: "Use $agent-paper-grounded-reading to read this paper deeply, preserve source grounding, extract a research lens with new idea directions, match the report language to the user's request language (Chinese request -> Chinese report with English proper nouns and identifiers; otherwise English), obey explicit source restrictions such as PDF-only/no-LaTeX, use the bundled PDF extraction and snippet-validation scripts for PDF-primary runs, always build the static evidence reader, always launch the local reader webpage, and return the local URL."
