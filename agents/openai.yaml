interface:
  display_name: "Agent Paper Grounded Reading"
  short_description: "Grounded long-form paper reading with reusable PDF/LaTeX tools and a live reader."
  brand_color: "#0F766E"
  default_prompt: "Use $agent-paper-grounded-reading to read this paper deeply, preserve source grounding, write a complete long-form report with no artificial length cap so the user can understand the original paper from the report alone, extract a research lens with new idea directions, match the report language to the user's request language (Chinese request -> Chinese report with English proper nouns and identifiers; otherwise English), obey explicit source restrictions such as PDF-only/no-LaTeX, use the bundled LaTeX and PDF preparation scripts for source-package/PDF-primary runs, render report/evidence formulas and short symbols such as G_i, phi_i, alpha, N, and r as MathML rather than raw LaTeX or literal underscore text in the static reader, always build the static evidence reader, always launch the local reader webpage, and return the local URL."
